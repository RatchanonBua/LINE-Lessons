<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    <title>LIFF: LINE Front-end Framework</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/gh/iamprompt/liff-sdk@latest/liff/edge/2/sdk.js?v=1"></script>
    <script src="index.js" defer></script>
  </head>
  <body id="body">
    <section id="profile">
      <img id="pictureUrl" src="https://vos.line-scdn.net/imgs/apis/ic_liff.png">
      <p id="userId"></p>
      <p id="displayName"></p>
      <p id="statusMessage"></p>
      <p id="email"></p>
    </section>
    <section id="feature">
      <p id="code"></p>
      <p id="friendShip"></p>
    </section>
    <section id="button">
      <button id="btnSend">Send Message</button>
      <button id="btnShare">Share Target Picker</button>
      <button id="btnScanCode">Scan Code</button>
      <button id="btnOpenWindow">Open Window</button>
      <button id="btnLogIn">Log In</button>
      <button id="btnLogOut">Log Out</button>
    </section>
  </body>
</html>
